<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Examy Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Admin-specific layout remains, but using global variables */
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: calc(100vh - 70px);
        }

        .content {
            padding: 2rem;
            overflow-y: auto;
            grid-column: 2;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">Examy Admin</div>
        <div class="nav-links">
            <span id="adminName" style="font-weight: 600;">System Admin</span>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="#" class="active" onclick="showSection('examsSection')">Manage Exams</a></li>
                <li><a href="#" onclick="showSection('resultsSection')">View Results</a></li>
            </ul>
            <div style="margin-top: auto;">
                <button onclick="logout()" class="btn btn-danger btn-block">Logout</button>
            </div>
        </aside>

        <main class="content">
            <!-- Exams Section -->
            <section id="examsSection">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Manage Exams</h2>
                    <button class="btn btn-primary" onclick="openExamModal()">Create New Exam</button>
                </div>

                <div class="glass-panel" style="padding: 1.5rem;">
                    <table class="data-table" id="examsTable">
                        <thead>
                            <tr>
                                <th style="color: var(--teal-dim);">ID</th>
                                <th style="color: var(--teal-dim);">Title</th>
                                <th style="color: var(--teal-dim);">Duration (mins)</th>
                                <th style="color: var(--teal-dim);">Total Marks</th>
                                <th style="color: var(--teal-dim);">Questions</th>
                                <th style="color: var(--teal-dim);">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Results Section -->
            <section id="resultsSection" style="display: none;">
                <h2 style="margin-bottom: 2rem;">Exam Results</h2>
                <div class="glass-panel" style="padding: 1.5rem;">
                    <table class="data-table" id="resultsTable">
                        <thead>
                            <tr>
                                <th style="color: var(--teal-dim);">Student</th>
                                <th style="color: var(--teal-dim);">Exam</th>
                                <th style="color: var(--teal-dim);">Score</th>
                                <th style="color: var(--teal-dim);">Percentage</th>
                                <th style="color: var(--teal-dim);">Status</th>
                                <th style="color: var(--teal-dim);">Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Bulk Question Editor Section -->
            <section id="questionEditorSection" class="dashboard-section" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <button class="btn btn-back" onclick="closeQuestionEditor()" style="margin-bottom: 1rem;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                            Back to Exams
                        </button>
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <h2>Question Builder</h2>
                            <span id="editorTotalCountBadge"
                                style="background: var(--teal-mist); color: var(--teal-text); padding: 0.25rem 0.75rem; border-radius: var(--r-full); font-size: 0.85rem; font-weight: 700;"></span>
                        </div>
                        <p id="editorExamTitle" style="color: var(--ink-muted); margin-top: 0.25rem;">Drafting questions
                        </p>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                    </div>
                </div>

                <div id="editorErrorAlert"
                    style="display: none; padding: 1rem; background: var(--rose-mist); color: var(--rose-text); border-radius: var(--r-md); margin-bottom: 1.5rem; font-weight: 500;">
                    Please fix the errors below before saving.
                </div>

                <!-- Container for all dynamic question blocks -->
                <div id="questionBlocksContainer"
                    style="display: flex; flex-direction: column; gap: 2rem; padding-bottom: 4rem;">
                    <!-- Question blocks will be injected here via JS -->
                </div>

                <!-- Global Action Bar at the bottom -->
                <div
                    style="display: flex; justify-content: flex-end; padding: 2rem; border-top: 1px solid var(--card-border); background: var(--card); border-radius: 0 0 var(--r-xl) var(--r-xl); margin-top: -2rem; z-index: 5;">
                    <button class="btn btn-primary" onclick="saveBulkQuestions()"
                        style="padding: 1rem 3rem; font-size: 1.1rem; box-shadow: var(--sh-md);">
                        Save Entire Exam
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Create Exam Modal -->
    <div id="examModal" class="modal">
        <div class="modal-content">
            <h3>Create New Exam</h3>
            <form id="examForm" style="margin-top: 1.5rem;">
                <div class="form-group">
                    <label class="form-label">Exam Title</label>
                    <input type="text" id="examTitle" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Duration (Minutes)</label>
                    <input type="number" id="examDuration" class="form-input" required min="1">
                </div>
                <div class="form-group">
                    <label class="form-label">Total Marks</label>
                    <input type="number" id="examMarks" class="form-input" required min="1">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeExamModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>



    <script src="/js/auth.js?v=5"></script>
    <script src="/js/admin.js?v=5"></script>
</body>

</html>
