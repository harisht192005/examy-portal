<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result - Examy Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .result-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 3rem;
            text-align: center;
            box-shadow: var(--glass-shadow);
            margin: 4rem auto;
            max-width: 600px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 auto 2rem auto;
            box-shadow: var(--sh-md);
            border: 2px solid transparent;
            transition: all var(--t-base) var(--ease);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: var(--card-raised);
            padding: 1.5rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--card-border);
            box-shadow: var(--sh-sm);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ink);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--ink-muted);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">Examy Portal</div>
    </nav>

    <div class="container">
        <div class="result-card" id="resultContainer" style="display: none;">
            <h2 id="r_title" style="color: var(--teal-text); margin-bottom: 2rem; font-size: 2rem;">Exam Title</h2>

            <div id="r_status_circle" class="score-circle">
                <span id="r_percentage">0%</span>
            </div>

            <h3 id="r_status_text" style="font-size: 1.75rem; margin-bottom: 2rem;"></h3>

            <div class="stat-grid">
                <div class="stat-item">
                    <div class="stat-value" id="r_score">0</div>
                    <div class="stat-label">Total Score</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="r_total_q">0</div>
                    <div class="stat-label">Total Questions</div>
                </div>
                <div class="stat-item" style="border-left: 4px solid var(--teal);">
                    <div class="stat-value" id="r_correct">0</div>
                    <div class="stat-label">Correct Answers</div>
                </div>
                <div class="stat-item" style="border-left: 4px solid var(--rose);">
                    <div class="stat-value" id="r_incorrect">0</div>
                    <div class="stat-label">Incorrect Answers</div>
                </div>
            </div>

            <a href="/student-results.html" class="btn btn-primary no-hover"
                style="padding: 1rem 2.5rem; font-size: 1.125rem;">Return to My Results</a>
        </div>
        <div id="loading" style="text-align: center; margin-top: 5rem; font-size: 1.25rem; font-weight: 600;">
            Loading Result...
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/result.js"></script>
</body>

</html>
