<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results - Examy Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="dash-container-v2">
    <!-- Sidebar V2 -->
    <aside class="sidebar-v2">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            <span>Examy</span>
        </div>
        <nav class="sidebar-nav-v2">
            <a href="/student-dashboard.html" class="sidebar-link-v2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="9"></rect>
                    <rect x="14" y="3" width="7" height="5"></rect>
                    <rect x="14" y="12" width="7" height="9"></rect>
                    <rect x="3" y="16" width="7" height="5"></rect>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="/student-results.html" class="sidebar-link-v2 active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>My Results</span>
            </a>
            <a href="#" class="sidebar-link-v2 sidebar-logout-v2" onclick="logout()" style="margin-top: auto;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </a>
        </nav>
    </aside>

    <div style="flex: 1; display: flex; flex-direction: column;">
        <header class="header-v2" style="justify-content: flex-end;">
            <div class="header-right-v2">
                <div class="profile-sm-v2">
                    <span id="studentNameHeader" style="font-weight: 600; font-size: 0.9rem;">Loading...</span>
                </div>
            </div>
        </header>

        <main class="main-v2">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0; font-size: 1.75rem; font-weight:700;">My Results</h2>
            </div>

            <div class="card-v2">
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 2px solid #EDF2F7;">
                                <th
                                    style="padding: 1.2rem; color: var(--teal-dim); font-weight: 600; font-size: 0.85rem; text-transform: uppercase;">
                                    Exam Title</th>
                                <th
                                    style="padding: 1.2rem; color: var(--teal-dim); font-weight: 600; font-size: 0.85rem; text-transform: uppercase;">
                                    Score</th>
                                <th
                                    style="padding: 1.2rem; color: var(--teal-dim); font-weight: 600; font-size: 0.85rem; text-transform: uppercase;">
                                    Percentage</th>
                                <th
                                    style="padding: 1.2rem; color: var(--teal-dim); font-weight: 600; font-size: 0.85rem; text-transform: uppercase;">
                                    Status</th>
                                <th
                                    style="padding: 1.2rem; color: var(--teal-dim); font-weight: 600; font-size: 0.85rem; text-transform: uppercase;">
                                    Date</th>
                                <th
                                    style="padding: 1.2rem; color: var(--teal-dim);font-weight: 600; font-size: 0.85rem; text-transform: uppercase;">
                                    Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentResultsTable">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/student-results.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth('student');
            if (user) {
                document.getElementById('studentNameHeader').textContent = user.name || 'Student';
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=3F51B5&color=fff&bold=true`;
                document.getElementById('headerAvatar').src = avatarUrl;
            }
        });
    </script>
</body>

</html>
