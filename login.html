<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Examy Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <nav class="navbar">
        <a href="/">
            <div class="nav-brand">Examy Portal</div>
        </a>
        <div class="nav-links">
            <a href="/register.html" class="btn btn-primary " style="color: black; ">Register</a>
        </div>
    </nav>

    <div class="auth-container glass-panel">
        <h2 style="text-align: center; color: var(--teal);">Welcome Back</h2>
        <p style="text-align: center; color: var(--ink-muted); margin-bottom: 2rem;">Please login to your account
        </p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" class="form-input" required placeholder="Enter your password"
                        style="padding-right: 3rem;">
                    <button type="button" tabindex="-1" onclick="togglePasswordVisibility('password', 'eyeIconLogin')"
                        style="position: absolute; right: 0.75rem; background: transparent; border: none; cursor: pointer; color: var(--ink-muted); display: flex; align-items: center; justify-content: center; padding: 0.25rem;">
                        <svg id="eyeIconLogin" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Login</button>
        </form>

        <div style="display: flex; align-items: center; margin: 1.5rem 0;">
            <hr style="flex: 1; border: none; border-top: 1px solid var(--card-border);">
            <span style="padding: 0 1rem; color: var(--ink-muted); font-size: 0.875rem;">OR</span>
            <hr style="flex: 1; border: none; border-top: 1px solid var(--card-border);">
        </div>

        <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
            <div id="g_id_onload"
                data-client_id="596426768378-0240d4v7rceisb126qf5ss71t13oap9s.apps.googleusercontent.com"
                data-context="signin" data-ux_mode="popup" data-callback="handleGoogleSignIn" data-auto_prompt="false">
            </div>

            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signin_with" data-size="large" data-logo_alignment="left">
            </div>
        </div>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
            Don't have an account? <a href="/register.html">Register here</a>
        </p>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
